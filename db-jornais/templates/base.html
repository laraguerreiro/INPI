<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DB Jornais IA{% endblock %}</title>
  <style>
    :root{--text:#20303a;--muted:#5e6b73;--accent:#1f6f8b;--border:rgba(32,48,58,0.10);--card:#fff;--bg:#f0f4f8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{background:var(--accent);padding:12px 24px;display:flex;gap:24px;align-items:center}
    nav a{color:#fff;text-decoration:none;font-weight:600;font-size:0.95rem}
    nav a:hover{opacity:0.8}
    nav .brand{font-size:1.2rem;margin-right:auto}
    .container{max-width:1100px;margin:0 auto;padding:24px}
    h1{font-size:1.6rem;margin-bottom:16px}
    h2{font-size:1.3rem;margin-bottom:12px}
    .card{background:var(--card);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.06);padding:20px;margin-bottom:20px}
    .stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .stat-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,0.06);flex:1;min-width:150px;text-align:center}
    .stat-card .num{font-size:2rem;font-weight:700;color:var(--accent)}
    .stat-card .label{font-size:0.85rem;color:var(--muted)}
    table{width:100%;border-collapse:collapse;font-size:0.9rem}
    th{background:#f5f7fa;text-align:left;padding:10px 12px;font-weight:600;border-bottom:2px solid var(--border)}
    td{padding:10px 12px;border-bottom:1px solid var(--border)}
    tr:hover{background:#f9fafb}
    .btn{display:inline-block;padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;text-decoration:none;font-weight:600}
    .btn:hover{opacity:0.85}
    .btn-sm{padding:5px 12px;font-size:0.8rem}
    .btn-danger{background:#c0392b}
    .btn-secondary{background:#e2e8f0;color:var(--text)}
    .btn-success{background:#27ae60}
    input[type=text],input[type=file],select,textarea{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:0.95rem;width:100%;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--accent)}
    label{font-weight:600;display:block;margin-bottom:4px;font-size:0.9rem}
    .form-group{margin-bottom:14px}
    .form-row{display:flex;gap:12px;flex-wrap:wrap}
    .form-row .form-group{flex:1;min-width:200px}
    .tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.8rem;font-weight:600}
    .tag-blue{background:#dbeafe;color:#1e40af}
    .tag-green{background:#dcfce7;color:#166534}
    .tag-yellow{background:#fef9c3;color:#854d0e}
    .tag-red{background:#fee2e2;color:#991b1b}
    .text-muted{color:var(--muted);font-size:0.85rem}
    .text-excerpt{max-height:200px;overflow-y:auto;font-size:0.88rem;line-height:1.7;padding:12px;background:#f9fafb;border-radius:8px;margin-top:8px}
    mark{background:#ffe066;padding:1px 3px;border-radius:2px}
    .filters{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:20px}
    .filters .form-group{margin-bottom:0}
    .empty{text-align:center;padding:40px;color:var(--muted)}
    @media print{nav{display:none}.container{padding:0}}
    @media(max-width:600px){.form-row{flex-direction:column}.stats-row{flex-direction:column}}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">DB Jornais IA</a>
    <a href="/importar">Importar PDFs</a>
    <a href="/materias">Matérias</a>
    <a href="/busca">Busca no banco</a>
    <a href="/exportar">Exportar CSV</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
