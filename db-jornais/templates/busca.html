{% extends "base.html" %}
{% block title %}Busca no banco{% endblock %}
{% block content %}
<h1>Busca no banco de dados</h1>
<div class="card">
  <form method="POST" action="/busca/executar">
    <div class="form-group">
      <label>Termo de busca</label>
      <input type="text" name="termo" placeholder="Ex: patente, inteligência artificial..." required>
      <p class="text-muted" style="margin-top:4px">Busca no texto completo das matérias já importadas.</p>
    </div>
    <button type="submit" class="btn">Buscar</button>
  </form>
</div>
{% endblock %}
