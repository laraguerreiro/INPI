<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDA-PI</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
    url("Background_biotech.jpg") center/cover fixed;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#1f6f8b;
}

.card{
  background:white;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.body{
  padding:15px;
  display:none;
}

.body.open{
  display:block;
}

button{
  cursor:pointer;
}

.score-btn{
  width:40px;
  height:40px;
  margin:5px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#f5f5f5;
  font-weight:bold;
}

.score-btn.active{
  background:#1f6f8b;
  color:white;
}

.toggle{
  background:#eee;
  border:none;
  padding:10px;
  border-radius:10px;
}

.result{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>AIDA-PI</h1>

<div id="app"></div>

<div class="result">
<h2>Resultado</h2>
<div id="score">0,0</div>
</div>

</div>

<script>

const data = [
{
id:"awareness",
title:"Awareness",
questions:[
"Conhecem propriedade intelectual?",
"Diferenciam publicar e proteger?",
"Sabem identificar ativos?",
"Conhecem tipos de proteção?"
]
},
{
id:"identificacao",
title:"Identificação",
questions:[
"Há política interna?",
"Existe responsável?",
"Monitoram concorrência?",
"Contratos incluem PI?"
]
}
];

const state = {};

data.forEach(d=>{
state[d.id] = new Array(d.questions.length).fill(0);
});

function toggle(id){
const el = document.getElementById(id);
el.classList.toggle("open");
}

function setScore(dim, q, val){
state[dim][q] = val;
render();
}

function calc(){
let total = 0;
let count = 0;

data.forEach(d=>{
state[d.id].forEach(v=>{
total += v;
count++;
});
});

return total/count;
}

function render(){

const app = document.getElementById("app");
app.innerHTML = "";

data.forEach(d=>{

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="header">
<h3>${d.title}</h3>
<button class="toggle" onclick="toggle('body-${d.id}')">▼</button>
</div>

<div class="body" id="body-${d.id}">
${d.questions.map((q,i)=>`
<p>${q}</p>
<div>
${[1,2,3,4,5].map(v=>`
<button 
class="score-btn ${state[d.id][i]===v?'active':''}"
onclick="event.stopPropagation(); setScore('${d.id}', ${i}, ${v})"
>${v}</button>
`).join("")}
</div>
`).join("")}
</div>
`;

app.appendChild(card);

});

document.getElementById("score").innerText = calc().toFixed(1);

}

render();

</script>

</body>
</html>
